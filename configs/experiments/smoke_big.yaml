# Big-model smoke (spec.md, "Verification"): the exact transformer-big
# dimensions and cosine/probe regime of ie_big on the tiny smoke selection,
# sized for the local 3090 — and reused as the payload for the ClearML
# round-trip gate on the H100 queue. Finishes in minutes; exercises the big
# model build, bf16, cosine schedule, probe early-stop/best-checkpoint,
# generation and artifact upload end-to-end before any real H100 time.
name: smoke_big
phase: one-to-many

data:
  selection: experiments/selection-smoke.csv
  holdouts: configs/holdouts-smoke.yaml
  source: greek
  max_len: 128
  max_ratio: 2.0

tokenizer:
  type: bpe
  vocab_size: 4000          # smoke corpus is too small for 32k pieces

model:                      # full transformer-big dims (small vocab shrinks params)
  arch: marian
  encoder_layers: 6
  decoder_layers: 6
  d_model: 1024
  encoder_attention_heads: 16
  decoder_attention_heads: 16
  encoder_ffn_dim: 4096
  decoder_ffn_dim: 4096
  dropout: 0.1
  label_smoothing: 0.1

training:
  optimizer: adamw
  lr: 5.0e-4
  warmup_steps: 100
  lr_scheduler: cosine
  per_device_batch_size: 16  # fits the 3090 alongside probe generation
  gradient_accumulation: 1
  max_grad_norm: 1.0
  bf16: true
  max_steps: 400
  eval_every_steps: 100
  seed: 13

inference:
  beam: 5
  length_penalty: 1.0
  max_length: 128

probe:
  every_steps: 100
  verses_per_language: 24    # Jonah has ~48 verses
  min_gain: 0.1
  patience_steps: 400        # never triggers within 400 steps; exercises the path
  batch_size: 16
  seed: 13

oversample_holdouts: 1
