# Transformer-big re-run of ie_base at matched data and holdouts (spec.md,
# "Goal"). Identical selection, composite Greek source, whole-OT holdouts and
# evaluation; the deliberate changes are model scale (~210M vs ~61M), a larger
# effective batch (256 vs 96 sequences), cosine decay and a probe-driven 100k
# step ceiling — report as "big + longer tuned schedule" vs base. Research-only:
# the selection includes non-derivative licences (deuelbbk by-nc-nd); the
# publishable twin is ie_big_shareable. Sized for an H100 (40 GB) via ClearML.
name: ie_big
phase: one-to-many

data:
  selection: experiments/selection-ie.csv
  holdouts: configs/holdouts-ie.yaml
  source: greek
  max_len: 192
  max_ratio: 2.0

tokenizer:
  type: bpe
  vocab_size: 32000

model:                    # transformer-big (~210M)
  arch: marian
  encoder_layers: 6
  decoder_layers: 6
  d_model: 1024
  encoder_attention_heads: 16
  decoder_attention_heads: 16
  encoder_ffn_dim: 4096
  decoder_ffn_dim: 4096
  dropout: 0.1
  label_smoothing: 0.1

training:
  optimizer: adamw
  lr: 5.0e-4
  warmup_steps: 4000
  lr_scheduler: cosine          # decays to ~0 at max_steps (HF passthrough)
  per_device_batch_size: 256    # H100 40 GB, grad-accum 1; effective 256 seqs,
  gradient_accumulation: 1      #   ~2.7x ie_base's 96. OOM fallbacks: 192x1, 128x2.
  max_grad_norm: 1.0
  bf16: true
  max_steps: 100000             # ceiling; probe early-stopping usually ends sooner
  eval_every_steps: 2000        # HF loss eval on the valid split; probe is separate
  seed: 13

inference:
  beam: 5
  length_penalty: 1.0
  max_length: 192

probe:                          # held-out chrF3 curve + early stop + best checkpoint
  every_steps: 1000
  verses_per_language: 250
  min_gain: 1.0
  patience_steps: 20000
  batch_size: 64
  seed: 13

oversample_holdouts: 1
